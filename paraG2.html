<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Underwater Survival</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#001b2e;font-family:'Arial',sans-serif;}
#ui{position:fixed;top:10px;left:10px;color:#e8f6ff;font-size:20px;text-shadow:2px 2px 4px #000;z-index:100;}
#msg{position:fixed;top:80px;left:10px;color:#ffd;font-size:28px;font-weight:bold;text-shadow:2px 2px 4px #000;}
#highscore{position:fixed;top:45px;left:10px;color:#aaddff;font-size:14px;text-shadow:1px 1px 2px #000;}
#controls{position:fixed;bottom:10px;left:10px;color:#aaddff;font-size:13px;text-shadow:1px 1px 2px #000;max-width:350px;line-height:1.6;}
#timer{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#00ffff;font-size:72px;font-weight:bold;text-shadow:4px 4px 8px #000;pointer-events:none;opacity:0;transition:opacity 0.3s;}
</style>
</head>
<body>
<div id="ui">
  スコア: <span id="score">0</span> | 
  生存時間: <span id="time">0</span>秒
</div>
<div id="highscore">ハイスコア: <span id="highscoreVal">0</span></div>
<div id="msg"></div>
<div id="timer"></div>
<div id="controls">
  <b>WASD:</b> 移動 | <b>スペース:</b> ダッシュ<br>
  敵を避けてコインを集めろ！<br>
  生き延びるほど高得点！
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>

// =====================
// オーディオ
// =====================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  try {
    const sounds = {
      coin: () => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
      },
      hit: () => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
      },
      dash: () => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'square';
        osc.frequency.value = 500;
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
      }
    };
    if(sounds[type]) sounds[type]();
  } catch(e) {}
}

// =====================
// シーン
// =====================
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0b3c5d, 0.015);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 12, 18);

const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x88ccee, 0.7));
const dir = new THREE.DirectionalLight(0xaadfff, 0.9);
dir.position.set(5, 15, 5);
scene.add(dir);

// =====================
// アリーナ
// =====================
const ARENA_SIZE = 60;

const wallMat = new THREE.MeshStandardMaterial({color: 0x1a4d5e, transparent: true, opacity: 0.6});
[[0, 4, -ARENA_SIZE, ARENA_SIZE * 2 + 4, 8, 2],
 [0, 4, ARENA_SIZE, ARENA_SIZE * 2 + 4, 8, 2],
 [-ARENA_SIZE, 4, 0, 2, 8, ARENA_SIZE * 2],
 [ARENA_SIZE, 4, 0, 2, 8, ARENA_SIZE * 2]
].forEach(w => {
  const wall = new THREE.Mesh(new THREE.BoxGeometry(w[3], w[4], w[5]), wallMat);
  wall.position.set(w[0], w[1], w[2]);
  scene.add(wall);
});

scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(150, 32, 32),
  new THREE.MeshBasicMaterial({color: 0x0b3c5d, side: THREE.BackSide})
));

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(ARENA_SIZE * 2.5, ARENA_SIZE * 2.5),
  new THREE.MeshStandardMaterial({color: 0x1f6f8b})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

scene.add(new THREE.LineLoop(
  new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-ARENA_SIZE, 0.1, -ARENA_SIZE),
    new THREE.Vector3(ARENA_SIZE, 0.1, -ARENA_SIZE),
    new THREE.Vector3(ARENA_SIZE, 0.1, ARENA_SIZE),
    new THREE.Vector3(-ARENA_SIZE, 0.1, ARENA_SIZE),
  ]),
  new THREE.LineBasicMaterial({color: 0x00ddff})
));

// 岩（当たり判定用に配列に保存）
const rocks = [];
for(let i = 0; i < 25; i++) {
  const r = Math.random() * 1.5 + 1.0;
  const rock = new THREE.Mesh(
    new THREE.DodecahedronGeometry(r, 1),
    new THREE.MeshStandardMaterial({color: 0x445566})
  );
  const angle = Math.random() * Math.PI * 2;
  const dist = Math.random() * (ARENA_SIZE - 10) + 5;
  rock.position.set(Math.cos(angle) * dist, r, Math.sin(angle) * dist);
  rock.userData = {radius: r};
  scene.add(rock);
  rocks.push(rock);
}

// 海藻
for(let i = 0; i < 30; i++) {
  const h = Math.random() * 15 + 15;
  const kelp = new THREE.Mesh(
    new THREE.CylinderGeometry(0.15, 0.3, h, 8, 4, true),
    new THREE.MeshStandardMaterial({color: 0x2e8b57})
  );
  const angle = Math.random() * Math.PI * 2;
  const dist = Math.random() * (ARENA_SIZE - 5);
  kelp.position.set(Math.cos(angle) * dist, h/2, Math.sin(angle) * dist);
  scene.add(kelp);
}

// 泡
const bubbles = [];
for(let i = 0; i < 60; i++) {
  const bubble = new THREE.Mesh(
    new THREE.SphereGeometry(0.1 + Math.random() * 0.2, 8, 8),
    new THREE.MeshBasicMaterial({color: 0xaaddff, transparent: true, opacity: 0.5})
  );
  bubble.position.set(
    (Math.random() - 0.5) * ARENA_SIZE * 2,
    Math.random() * 20,
    (Math.random() - 0.5) * ARENA_SIZE * 2
  );
  bubble.userData = {speed: 0.5 + Math.random() * 0.8};
  scene.add(bubble);
  bubbles.push(bubble);
}

// =====================
// プレイヤー
// =====================
const player = new THREE.Mesh(
  new THREE.SphereGeometry(0.7, 24, 24),
  new THREE.MeshStandardMaterial({color: 0xffffff, emissive: 0x4444ff, emissiveIntensity: 0.3})
);
player.position.y = 0.7;
scene.add(player);

const playerLight = new THREE.PointLight(0x88ccff, 1.5, 15);
player.add(playerLight);

// =====================
// オブジェクトプール（配列操作なし）
// =====================
const MAX_COINS = 20;
const coins = [];

for(let i = 0; i < MAX_COINS; i++) {
  const coin = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5, 0.5, 0.15, 16),
    new THREE.MeshStandardMaterial({color: 0xffdd00, emissive: 0xffaa00, emissiveIntensity: 0.6})
  );
  coin.rotation.x = Math.PI/2;
  coin.userData = {active: false, t: 0};
  coin.visible = false;
  scene.add(coin);
  coins.push(coin);
}

const MAX_ENEMIES = 50;
const enemies = [];

for(let i = 0; i < MAX_ENEMIES; i++) {
  const enemyGroup = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.9, 0.9, 0.9),
    new THREE.MeshStandardMaterial({color: 0xff4444, emissive: 0xff4444, emissiveIntensity: 0.4})
  );
  enemyGroup.add(body);
  
  const spikeGeo = new THREE.ConeGeometry(0.12, 0.4, 4);
  [[0.5, 0, 0], [-0.5, 0, 0], [0, 0.5, 0], [0, -0.5, 0], [0, 0, 0.5], [0, 0, -0.5]].forEach(p => {
    const spike = new THREE.Mesh(spikeGeo, new THREE.MeshStandardMaterial({color: 0xff4444, emissive: 0xff4444, emissiveIntensity: 0.6}));
    spike.position.set(p[0], p[1], p[2]);
    enemyGroup.add(spike);
  });
  
  enemyGroup.userData = {active: false, speed: 2, t: 0, behavior: 0};
  enemyGroup.visible = false;
  scene.add(enemyGroup);
  enemies.push(enemyGroup);
}

// =====================
// スポーン関数
// =====================
function spawnCoin() {
  for(let i = 0; i < MAX_COINS; i++) {
    if(!coins[i].userData.active) {
      // 50%の確率でプレイヤー近く、50%でランダム
      let x, z;
      if(Math.random() < 0.5) {
        const angle = Math.random() * Math.PI * 2;
        const dist = 10 + Math.random() * 15;
        x = player.position.x + Math.cos(angle) * dist;
        z = player.position.z + Math.sin(angle) * dist;
      } else {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * (ARENA_SIZE - 5);
        x = Math.cos(angle) * dist;
        z = Math.sin(angle) * dist;
      }
      coins[i].position.set(x, 0.5, z);
      coins[i].userData.active = true;
      coins[i].userData.t = Math.random() * 10;
      coins[i].visible = true;
      return;
    }
  }
}

function spawnEnemy() {
  for(let i = 0; i < MAX_ENEMIES; i++) {
    if(!enemies[i].userData.active) {
      const angle = Math.random() * Math.PI * 2;
      const dist = ARENA_SIZE - 5;
      enemies[i].position.set(Math.cos(angle) * dist, 0.5, Math.sin(angle) * dist);
      enemies[i].userData.active = true;
      enemies[i].userData.speed = 2.5 + Math.random() * 1.5 + difficulty * 0.5;
      enemies[i].userData.t = Math.random() * 10;
      enemies[i].userData.behavior = Math.floor(Math.random() * 4); // 0=直線, 1=ジグザグ, 2=待機, 3=高速突進
      enemies[i].userData.waitTime = 0;
      enemies[i].visible = true;
      return;
    }
  }
}

// 初期スポーン
for(let i = 0; i < 10; i++) spawnCoin();

// =====================
// 入力
// =====================
const key = {};
addEventListener("keydown", e => {
  key[e.key.toLowerCase()] = true;
  if(e.code === 'Space' && dashCooldown <= 0) {
    dashSpeed = 25;
    dashCooldown = 1.0;
    playSound('dash');
  }
});
addEventListener("keyup", e => key[e.key.toLowerCase()] = false);

let touchX = 0, touchY = 0;
addEventListener("touchmove", e => {
  const t = e.touches[0];
  touchX = (t.clientX/innerWidth - 0.5) * 2;
  touchY = (t.clientY/innerHeight - 0.5) * 2;
}, {passive: false});

addEventListener("touchstart", () => {
  if(dashCooldown <= 0) {
    dashSpeed = 25;
    dashCooldown = 1.0;
    playSound('dash');
  }
});

// =====================
// ゲーム状態
// =====================
let score = 0, survivalTime = 0;
let highscore = parseInt(localStorage.getItem('paraG2HS') || '0');
let invincible = 3, dashSpeed = 0, dashCooldown = 0, difficulty = 0;
let gameActive = true, enemySpawnTimer = 0, coinSpawnTimer = 0;

const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");
const highscoreEl = document.getElementById("highscoreVal");
const msg = document.getElementById("msg");
const timerEl = document.getElementById("timer");

highscoreEl.textContent = highscore;

// =====================
// ループ
// =====================
let last = performance.now();

function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  if(gameActive) update(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// =====================
// 更新
// =====================
function update(dt) {
  survivalTime += dt;
  difficulty = Math.floor(survivalTime / 10);
  
  let baseSpeed = 10;
  if(dashSpeed > 0) {
    baseSpeed += dashSpeed;
    dashSpeed -= dt * 60;
    if(dashSpeed < 0) dashSpeed = 0;
  }
  
  let vx = 0, vz = 0;
  if(key.w) vz -= 1;
  if(key.s) vz += 1;
  if(key.a) vx -= 1;
  if(key.d) vx += 1;
  
  const len = Math.hypot(vx, vz);
  if(len > 0) { vx /= len; vz /= len; }
  
  player.position.x += (vx + touchX) * baseSpeed * dt;
  player.position.z += (vz + touchY) * baseSpeed * dt;
  player.position.x = Math.max(-ARENA_SIZE + 1, Math.min(ARENA_SIZE - 1, player.position.x));
  player.position.z = Math.max(-ARENA_SIZE + 1, Math.min(ARENA_SIZE - 1, player.position.z));
  
  // 岩の当たり判定
  rocks.forEach(rock => {
    const dx = player.position.x - rock.position.x;
    const dz = player.position.z - rock.position.z;
    const dist = Math.hypot(dx, dz);
    const minDist = rock.userData.radius + 0.7;
    if(dist < minDist) {
      const nx = dx / (dist + 0.001);
      const nz = dz / (dist + 0.001);
      player.position.x = rock.position.x + nx * minDist;
      player.position.z = rock.position.z + nz * minDist;
    }
  });
  
  if(len > 0) player.rotation.y += dt * 5;
  if(dashCooldown > 0) dashCooldown -= dt;
  
  bubbles.forEach(b => {
    b.position.y += b.userData.speed * dt;
    if(b.position.y > 20) b.position.y = 0;
  });
  
  // コイン（配列操作なし）
  for(let i = 0; i < MAX_COINS; i++) {
    if(!coins[i].userData.active) continue;
    coins[i].userData.t += dt;
    coins[i].rotation.y += dt * 4;
    coins[i].position.y = 0.5 + Math.sin(coins[i].userData.t * 2) * 0.3;
    const dist = Math.hypot(player.position.x - coins[i].position.x, player.position.z - coins[i].position.z);
    if(dist < 1.5) {
      coins[i].userData.active = false;
      coins[i].visible = false;
      const coinValue = 100 + difficulty * 20; // 難易度が上がるほど高価値
      score += coinValue;
      playSound('coin');
    }
  }
  
  coinSpawnTimer += dt;
  const coinRate = Math.max(1.0, 2 - difficulty * 0.1);
  if(coinSpawnTimer > coinRate) {
    coinSpawnTimer = 0;
    spawnCoin();
    // 高難易度では2個同時スポーン
    if(difficulty > 3 && Math.random() < 0.5) spawnCoin();
  }
  
  // 敵（配列操作なし）
  let activeEnemyCount = 0;
  for(let i = 0; i < MAX_ENEMIES; i++) {
    if(!enemies[i].userData.active) continue;
    activeEnemyCount++;
    
    const dx = player.position.x - enemies[i].position.x;
    const dz = player.position.z - enemies[i].position.z;
    const dist = Math.hypot(dx, dz) + 0.001;
    
    enemies[i].rotation.y += dt * 5;
    enemies[i].userData.t += dt;
    
    // 行動パターン
    switch(enemies[i].userData.behavior) {
      case 0: // 直線追跡
        enemies[i].position.x += dx / dist * enemies[i].userData.speed * dt;
        enemies[i].position.z += dz / dist * enemies[i].userData.speed * dt;
        break;
      case 1: // ジグザグ
        const zigzag = Math.sin(enemies[i].userData.t * 4) * 2;
        enemies[i].position.x += (dx / dist * enemies[i].userData.speed + zigzag * Math.cos(Math.atan2(dz, dx))) * dt;
        enemies[i].position.z += (dz / dist * enemies[i].userData.speed + zigzag * Math.sin(Math.atan2(dz, dx))) * dt;
        break;
      case 2: // 待機→突進
        enemies[i].userData.waitTime += dt;
        if(enemies[i].userData.waitTime > 2) {
          enemies[i].position.x += dx / dist * enemies[i].userData.speed * 2 * dt;
          enemies[i].position.z += dz / dist * enemies[i].userData.speed * 2 * dt;
          if(enemies[i].userData.waitTime > 3) enemies[i].userData.waitTime = 0;
        }
        break;
      case 3: // 高速突進
        enemies[i].position.x += dx / dist * enemies[i].userData.speed * 1.5 * dt;
        enemies[i].position.z += dz / dist * enemies[i].userData.speed * 1.5 * dt;
        break;
    }
    
    enemies[i].position.x = Math.max(-ARENA_SIZE + 2, Math.min(ARENA_SIZE - 2, enemies[i].position.x));
    enemies[i].position.z = Math.max(-ARENA_SIZE + 2, Math.min(ARENA_SIZE - 2, enemies[i].position.z));
    
    // 敵同士が近すぎたら散開
    for(let j = i + 1; j < MAX_ENEMIES; j++) {
      if(!enemies[j].userData.active) continue;
      const edx = enemies[i].position.x - enemies[j].position.x;
      const edz = enemies[i].position.z - enemies[j].position.z;
      const edist = Math.hypot(edx, edz);
      if(edist < 2) {
        const pushForce = (2 - edist) * 0.5;
        enemies[i].position.x += (edx / (edist + 0.001)) * pushForce;
        enemies[i].position.z += (edz / (edist + 0.001)) * pushForce;
        enemies[j].position.x -= (edx / (edist + 0.001)) * pushForce;
        enemies[j].position.z -= (edz / (edist + 0.001)) * pushForce;
      }
    }
    
    // 群れすぎたらリセット
    if(dist < 5) {
      let nearbyCount = 0;
      for(let j = 0; j < MAX_ENEMIES; j++) {
        if(!enemies[j].userData.active || i === j) continue;
        const checkDist = Math.hypot(enemies[i].position.x - enemies[j].position.x, enemies[i].position.z - enemies[j].position.z);
        if(checkDist < 8) nearbyCount++;
      }
      // 8体以上固まったら一部を端に飛ばす
      if(nearbyCount > 8 && Math.random() < 0.1) {
        const resetAngle = Math.random() * Math.PI * 2;
        enemies[i].position.x = Math.cos(resetAngle) * (ARENA_SIZE - 5);
        enemies[i].position.z = Math.sin(resetAngle) * (ARENA_SIZE - 5);
      }
    }
    
    if(invincible <= 0 && dist < 1.2) {
      gameOver();
      return;
    }
  }
  
  enemySpawnTimer += dt;
  const spawnRate = Math.max(0.3, 1.5 - difficulty * 0.15);
  if(enemySpawnTimer > spawnRate) {
    enemySpawnTimer = 0;
    spawnEnemy();
  }
  
  camera.position.x += (player.position.x - camera.position.x) * 0.1;
  camera.position.z += (player.position.z + 18 - camera.position.z) * 0.1;
  camera.position.x = Math.max(-ARENA_SIZE + 5, Math.min(ARENA_SIZE - 5, camera.position.x));
  camera.position.z = Math.max(-ARENA_SIZE + 5, Math.min(ARENA_SIZE - 5, camera.position.z));
  camera.lookAt(player.position);
  
  if(invincible > 0) {
    invincible -= dt;
    player.material.emissiveIntensity = 0.5 + Math.sin(Date.now() * 0.01) * 0.3;
    const countdown = Math.ceil(invincible);
    if(invincible > 0 && Math.abs(invincible - countdown) < dt) {
      timerEl.textContent = countdown > 0 ? countdown : "GO!";
      timerEl.style.opacity = 1;
      setTimeout(() => timerEl.style.opacity = 0, 500);
    }
  } else {
    player.material.emissiveIntensity = dashSpeed > 0 ? 1.0 : 0.3;
  }
  
  const totalScore = Math.floor(survivalTime * 10) + score;
  scoreEl.textContent = totalScore;
  timeEl.textContent = Math.floor(survivalTime);
  
  if(invincible <= 0) {
    msg.textContent = dashCooldown > 0 ? `ダッシュ: ${dashCooldown.toFixed(1)}秒` : "ダッシュ準備完了！";
  } else {
    msg.textContent = "無敵時間";
  }
  
  if(totalScore > highscore) {
    highscore = totalScore;
    highscoreEl.textContent = highscore;
  }
}

// =====================
// ゲームオーバー
// =====================
function gameOver() {
  gameActive = false;
  playSound('hit');
  
  const totalScore = Math.floor(survivalTime * 10) + score;
  if(totalScore > highscore) localStorage.setItem('paraG2HS', totalScore);
  
  timerEl.textContent = "GAME OVER";
  timerEl.style.opacity = 1;
  timerEl.style.color = '#ff4444';
  
  setTimeout(() => {
    for(let i = 0; i < MAX_COINS; i++) {
      coins[i].userData.active = false;
      coins[i].visible = false;
    }
    for(let i = 0; i < MAX_ENEMIES; i++) {
      enemies[i].userData.active = false;
      enemies[i].visible = false;
    }
    
    score = 0; survivalTime = 0; difficulty = 0;
    invincible = 3; dashSpeed = 0; dashCooldown = 0;
    enemySpawnTimer = 0; coinSpawnTimer = 0;
    player.position.set(0, 0.7, 0);
    scoreEl.textContent = 0; timeEl.textContent = 0;
    timerEl.style.opacity = 0; timerEl.style.color = '#00ffff';
    
    for(let i = 0; i < 10; i++) spawnCoin();
    gameActive = true;
  }, 3000);
}

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
